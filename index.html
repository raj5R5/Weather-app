<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather app</title>
    <link rel="icon" href="assets/logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <h1>Weather App</h1>
        <div class="user-input">
            <input class="input-box" type="text" placeholder="Enter the city name">
            <button class="search"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div class="card">
            <div class="icon">
                <i class="fa-solid fa-face-smile" id="icon"></i>
                <p class="heading" id="desc">Hi! <br>Enter the city name <br>To know the weather</p>
            </div>
            <div class="temprature">
                <p id="temp"></p>
                <p class="heading" id="cityName"></p>
            </div>
            <div class="info">
                <div class="humidity">
                    <p class="heading">Humidity</p>
                    <p id="humidity"></p>
                </div>
                <div class="wind">
                    <p class="heading">Wind</p>
                    <p id="wind"></p>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
